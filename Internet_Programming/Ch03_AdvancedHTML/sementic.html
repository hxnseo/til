<!DOCTYPE html>

<html>
    <head>
        <title>Multicolumns</title>
        <style type = "text/css">
            p { margin: 0.5em; text-align: justify;}
            section {column-count: 3; column-gap: 30px; column-rule: 1px outset black;}
        </style>
    </head>

    <body>
        <header>
            <h1>Great Expectations, by Charles Dickens</h1>
        </header>
        <section class = "chapter1">
            <p>
                this is paragraph 1.
            </p>
            <p>중간 생략</p>
            <p>
                this is paragraph 2.
            </p>
            <footer>&copy; The Project Gutenberg EBook of Great Expectations, by Charles Dickens</footer>
        </section>
    </body>
</html>

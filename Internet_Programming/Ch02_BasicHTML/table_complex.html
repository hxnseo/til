<!DOCTYPE html>
<!--Complex HTML5 table.-->

<html>
    <head>
        <meta charset = "uft=8">
        <title>Tables</title>
    </head>

    <body>
        <h1>Table Example: Spanning Rows and Columns</h1>

        <table border = "1">
            <caption>A more complex sample table</caption>

            <thead>
                <tr>
                    <th rowspan = "2">
                        <img src = "yonsei_cs.jpg" width = "205"
                            height = "167" alt = "Logo of Yonsei Computer Science">
                    </th>
                    <th colspan = "4">
                        <strong>Camelid comparison
                            Approximate as of 6/2011
                        </strong>
                    </th>
                </tr>
                <tr>
                    <th># of humps</th>
                    <th>Indigeneous region</th>
                    <th>Spits?</th>
                    <th>Produces wool?</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th>Camels (bactrian)</th>
                    <td>2</td>
                    <td>Africa/Asia</td>
                    <td>Yes</td>
                    <td>Yes</td>
                </tr>

                <tr>
                    <th>Llamas</th>
                    <td>1</td>
                    <td>Andes Mountains</td>
                    <td>Yes</td>
                    <td>Yes</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>

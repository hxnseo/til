<!DOCTYPE html>

<html>
    <head>
        <meta charset = "utf-8">
        <title>Embedded Style Sheet</title>

        <style type = "text/css">
            em { background-color: yellow;
                font-weight: bold;
                color: black; }
            h1 { font-family: tahoma, helvetica, sans-serif; }
            p { font-size: 12pt;
                font-family: arial, sans-serif; }
            .special { color: purple; }
        </style>
    </head>

    <body>
        <h1 class = "special">Deitel & Associates, Inc.</h1>
        <p>Deitel & Associates Introduction ... etc</p>

        <h1>Clients</h1>
        <p class = "special">The company's clients include many <em>Fortune 1000 companies</em>,
        government agencies, branches of the military and business organizations.</p>
    </body>
</html>

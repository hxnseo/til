<!DOCTYPE html>

<html>
    <head>
        <title>Embedded Fonts</title>

        <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Playwrite+GB+J+Guides:ital@0;1&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style type="text/css">
            .Montserrat { font-family: 'Montserrat', Arial, Helvetica, sans-serif; font-size: 50px; }
            .Playwrite { font-family: 'Playwrite GB J Guides', Arial, Helvetica, sans-serif; font-size: 50px; }
            .Roboto { font-family: 'Roboto', Arial, Helvetica, sans-serif; font-size: 50px; }
        </style>
    </head>

    <body>
        <div class = "Montserrat">
            <b>Embedding the web font "Montserrat"</b>
        </div>

        <div class="Playwrite GB J Guides">
            <b>Embedding the web font "Playwrite"</b>
        </div>

        <div class = "Roboto">
            <b>Embedding the web font "Roboto"</b>
        </div>
    </body>
</html>

<!DOCTYPE html>

<html>
    <head>
        <title>Transition</title>
        <style type="text/css">
            img {
                margin: 100px;
                transition: transform 2s;
            }

            img:hover {
                transform: rotate(360deg) scale(2,2);
            }
        </style>
    </head>

    <body>
        <img src="icon_navy.png" width = "140" height = "140" alt = "chatGOV logo">
    </body>
</html>

<!DOCTYPE html>

<html>
    <head>
        <title>Multiple Backgrounds</title>
        <style type="text/css">
            div {
                background: url(icon_navy.png) right bottom no-repeat fixed border-box,
                            url(icon_white.png) left top repeat content-box;
                border: 5px solid dimgrey; padding: 20px;
                color: black;
                font-size: 150%;
            }
        </style>
    </head>

    <body>
        <div>
            <p>Welcome to Yonsei University!</p>
            <p>This is practice of multiple backgrounds of CSS3</p>
        </div>
    </body>
</html>
